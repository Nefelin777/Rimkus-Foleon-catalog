<div id="foleon-archive-root">
  <style>
    #foleon-archive-root { font-family: sans-serif; color: #333; }
    .filter-menu { margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap; }
    .filter-btn { 
      padding: 10px 20px; border: 1px solid #00acc8; background: transparent; 
      color: #00acc8; cursor: pointer; border-radius: 4px; transition: 0.2s;
    }
    .filter-btn.active, .filter-btn:hover { background: #00acc8; color: white; }
    
    .archive-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
      gap: 25px; 
    }
    .doc-card { 
      border: 1px solid #eee; border-radius: 8px; overflow: hidden; 
      transition: transform 0.2s; text-decoration: none; color: inherit;
    }
    .doc-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .doc-img { width: 100%; height: 180px; object-fit: cover; background: #f5f5f5; }
    .doc-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .doc-title { font-weight: bold; font-size: 16px; margin: 0; }
    .hidden { display: none; }
  </style>

  <div class="filter-menu">
    <button class="filter-btn active" onclick="filterData('all', this)">ALL</button>
    <button class="filter-btn" onclick="filterData('brochures', this)">BROCHURES</button>
    <button class="filter-btn" onclick="filterData('flyers', this)">FLYERS</button>
  </div>

  <div id="archive-grid" class="archive-grid">
    </div>

  <script>
    const myDocs = [
      { title: "Florida’s HB 913 (House Bill 913)", cat: "brochures", img: "https://assets.foleon.com/eu-central-1/de-uploads-7e3kk3/51566/image_0.aa93a8cbcfda.png", link: "https://docs.rimkus.com/bes-brochures/floridas-hb-913-house-bill-913/" },
      { title: "Florida’s HB 913 (House Bill 913)", cat: "brochures", img: "https://assets.foleon.com/eu-central-1/de-uploads-7e3kk3/51566/image_0.aa93a8cbcfda.png", link: "https://docs.rimkus.com/bes-brochures/floridas-hb-913-house-bill-913/" },
      { title: "Florida’s HB 913 (House Bill 913)", cat: "brochures", img: "https://assets.foleon.com/eu-central-1/de-uploads-7e3kk3/51566/image_0.aa93a8cbcfda.png", link: "https://docs.rimkus.com/bes-brochures/floridas-hb-913-house-bill-913/" },
      { title: "Florida’s HB 913 (House Bill 913)", cat: "brochures", img: "https://assets.foleon.com/eu-central-1/de-uploads-7e3kk3/51566/image_0.aa93a8cbcfda.png", link: "https://docs.rimkus.com/bes-brochures/floridas-hb-913-house-bill-913/" },
      { title: "Florida’s HB 913 (House Bill 913)", cat: "brochures", img: "https://assets.foleon.com/eu-central-1/de-uploads-7e3kk3/51566/image_0.aa93a8cbcfda.png", link: "https://docs.rimkus.com/bes-brochures/floridas-hb-913-house-bill-913/" },
      { title: "Florida’s HB 913 (House Bill 913)", cat: "brochures", img: "https://assets.foleon.com/eu-central-1/de-uploads-7e3kk3/51566/image_0.aa93a8cbcfda.png", link: "https://docs.rimkus.com/bes-brochures/floridas-hb-913-house-bill-913/" },
      { title: "Florida’s HB 913 (House Bill 913)", cat: "brochures", img: "https://assets.foleon.com/eu-central-1/de-uploads-7e3kk3/51566/image_0.aa93a8cbcfda.png", link: "https://docs.rimkus.com/bes-brochures/floridas-hb-913-house-bill-913/" },
      { title: "Florida’s HB 913 (House Bill 913)", cat: "brochures", img: "https://assets.foleon.com/eu-central-1/de-uploads-7e3kk3/51566/image_0.aa93a8cbcfda.png", link: "https://docs.rimkus.com/bes-brochures/floridas-hb-913-house-bill-913/" },
      { title: "Errors and Omissions Claim Evaluations", cat: "flyers", img: "https://assets.foleon.com/eu-central-1/de-uploads-7e3kk3/51566/wso-csm-preparation-exam.2472839d4f37.jpg", link: "https://docs.rimkus.com/forensics-flyers/errors-and-omissions-claim-evaluations/" },
      { title: "Advisory Services", cat: "brochures", img: "URL_КАРТИНКИ_3", link: "URL_PDF_3" },
    ];

    function renderGrid(items) {
      const grid = document.getElementById('archive-grid');
      grid.innerHTML = items.map(item => `
        <a href="${item.link}" target="_blank" class="doc-card">
          <img src="${item.img}" class="doc-img" alt="${item.title}">
          <div class="doc-info">
            <p class="doc-title">${item.title}</p>
            <span>→</span>
          </div>
        </a>
      `).join('');
    }

    function filterData(category, btn) {
      // Зміна активної кнопки
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Фільтрація
      if (category === 'all') {
        renderGrid(myDocs);
      } else {
        const filtered = myDocs.filter(d => d.cat === category);
        renderGrid(filtered);
      }
    }

    // Перший запуск
    renderGrid(myDocs);
  </script>
</div>
