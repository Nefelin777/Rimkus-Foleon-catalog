<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
    <style>
        body { font-family: 'Helvetica', sans-serif; margin: 0; padding: 20px; }
        
        /* Кнопки */
        .filters { margin-bottom: 30px; }
        .btn { 
            padding: 10px 25px; cursor: pointer; border: none; 
            background: #f0f0f0; margin-right: 10px; transition: 0.3s;
            border-radius: 4px; font-weight: bold; color: #555;
        }
        .btn:hover, .btn.active { background: #00acc8; color: white; }

        /* Сітка */
        .grid { width: 100%; }
        .element-item { 
            width: 30%; /* 3 колонки */
            margin-bottom: 25px;
            float: left;
            padding: 10px;
            box-sizing: border-box;
        }

        .card {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            transition: box-shadow 0.3s;
            text-decoration: none;
            display: block;
            color: #333;
        }
        .card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; display: flex; justify-content: space-between; align-items: center;}
    </style>
</head>
<body>

<div class="filters">
    <button class="btn active" data-filter="*">ALL</button>
    <button class="btn" data-filter=".brochures">BROCHURES</button>
    <button class="btn" data-filter=".flyers">FLYERS</button>
</div>

<div class="grid">
    </div>

<script>
// 1. Посилання на твою Google Таблицю (формат CSV)
const sheetUrl = 'ТВОЄ_ПОСИЛАННЯ_З_GOOGLE_SHEETS_CSV';

// Функція завантаження даних
async function loadData() {
    const response = await fetch(sheetUrl);
    const data = await response.text();
    const rows = data.split('\n').slice(1); // пропускаємо заголовок

    const grid = $('.grid');
    
    rows.forEach(row => {
        const columns = row.split(','); // Розбиваємо рядок на колонки
        if(columns.length < 4) return;

        const [title, category, img, link] = columns.map(c => c.trim());

        const html = `
            <div class="element-item ${category.toLowerCase()}">
                <a href="${link}" target="_blank" class="card">
                    <img src="${img}" alt="${title}">
                    <div class="card-content">
                        <strong>${title}</strong>
                        <span>→</span>
                    </div>
                </a>
            </div>`;
        grid.append(html);
    });

    // Ініціалізація Isotope після завантаження всіх карток
    var $grid = $('.grid').isotope({
        itemSelector: '.element-item',
        layoutMode: 'fitRows',
        stagger: 30,
        transitionDuration: '0.6s' // Швидкість анімації
    });

    // Логіка фільтрації
    $('.btn').on('click', function() {
        var filterValue = $(this).attr('data-filter');
        $grid.isotope({ filter: filterValue });
        $('.btn').removeClass('active');
        $(this).addClass('active');
    });
}

loadData();
</script>

</body>
</html>
