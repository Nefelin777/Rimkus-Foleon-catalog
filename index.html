<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Raleway:wght@400&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; }
        
        /* Фіксована панель фільтрів */
        .filters-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #fff;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }

        .filters { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            max-width: 100%;
            margin: 0;
            padding: 0 20px;
            box-sizing: border-box;
            justify-content: flex-start;
        }

        .btn { 
            font-family: 'Raleway', sans-serif;
            font-size: 16px;
            text-transform: uppercase;
            font-weight: 400;
            
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.3s;
            /* Кольори: неактивна - біла з обводкою 046A78 */
            background: #fff;
            color: #046A78;
            border: 2px solid #046A78;
            /* Прямі кути */
            border-radius: 0;
        }

        .btn.active, .btn:hover { 
            /* Активна/ховер - 046A78, текст білий */
            background: #046A78; 
            color: #fff; 
        }

        /* Сітка */
        .grid {
            display: grid;

            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; 
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            justify-content: center;
        }
       
        .element-item {
            width: 100%; /* Тепер Grid сам керує шириною */
            display: block;
            transition: opacity 0.3s ease; /* М'яка поява замість польотів Isotope */
        }
        .element-item.hidden {
            display: none;
        }
        /* Картка */
        .card {
            border: 1px solid #eee;
            border-radius: 0; /* Прямі кути */
            display: block;
            text-decoration: none;
            color: #333;
        }
        .card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .card img { 
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block; 
            border-radius: 0;
        }

        .card-info { 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            min-height: 90px; 
            box-sizing: border-box;
        }

        .card-info strong { 
            /* Шрифти назви: Montserrat 14, bold */
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
            max-width: 80%;
        }

        /* Коротша та жирна стрілка */
        .arrow {
            font-size: 20px;
            font-weight: 900;
            border-bottom: 3px solid #046A78;
            border-right: 3px solid #046A78;
            width: 10px;
            height: 10px;
            display: inline-block;
            transform: rotate(-45deg);
            margin-bottom: 5px;
        }

        /* Адаптивність */
        @media (min-width: 600px) {
            .element-item { width: 50% !important; } }
        }
        @media (min-width: 1024px) {
            .element-item { width: 33.333% !important; } }
        }
        @media (min-width: 1600px) {
            .element-item { width: 25% !important; } }
        }
        
    </style>
</head>
<body>

<div class="filters-wrapper">
    <div class="filters">
        <button class="btn active" data-filter="*">ALL</button>
        <button class="btn" data-filter=".bes-brochures">BES - Brochures</button>
        <button class="btn" data-filter=".bes-flyers">BES - Flyers</button>
        <button class="btn" data-filter=".bes-soqs">BES - SOQs</button>
        <button class="btn" data-filter=".forensics-brochures">Forensics - Brochures</button>
        <button class="btn" data-filter=".forensics-flyers">Forensics - Flyers</button>
        <button class="btn" data-filter=".forensics-soqs">Forensics - SOQs</button>
        <button class="btn" data-filter=".global-brochures">Global - Brochures</button>
        <button class="btn" data-filter=".global-flyers">Global - Flyers</button>
        <button class="btn" data-filter=".multidisciplinary-soqs">Multidisc. - SOQs</button>
        <button class="btn" data-filter=".qd-brochures">Q&D - Brochures</button>
        <button class="btn" data-filter=".qd-flyers">Q&D - Flyers</button>
        <button class="btn" data-filter=".qd-soqs">Q&D - SOQs</button>
    </div>
</div>

<div class="grid"></div>

<script>
const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSXuFx3_R87npfKsZh4iBvBgX0EA427a-STifaSQASfKEGIbIuyq05NHfPSdGxsKsijfWMn0ObuMMo8/pub?gid=0&single=true&output=csv';

async function initArchive() {
    try {
        const response = await fetch(sheetUrl);
        const csvText = await response.text();
        const rows = csvText.split(/\r?\n/).slice(1);
        const grid = $('.grid');

        rows.forEach(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (cols.length < 4) return;
            const [title, cat, img, link] = cols.map(c => c.trim().replace(/^"|"$/g, ''));

            // Чистий клас без крапки
            const filterClass = cat.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-');

            const html = `
                <div class="element-item ${filterClass}">
                    <a href="${link}" target="_blank" class="card">
                        <img src="${img}" alt="${title}">
                        <div class="card-info">
                            <strong>${title}</strong>
                            <div class="arrow"></div>
                        </div>
                    </a>
                </div>`;
            grid.append(html);
        });

        // ФІЛЬТРАЦІЯ
        $('.btn').on('click', function() {
            // Отримуємо значення, прибираємо крапку для порівняння з класом
            const filterValue = $(this).attr('data-filter').replace('.', '');
            
            if (filterValue === '*') {
                $('.element-item').removeClass('hidden');
            } else {
                $('.element-item').each(function() {
                    $(this).hasClass(filterValue) 
                        ? $(this).removeClass('hidden') 
                        : $(this).addClass('hidden');
                });
            }

            $('.btn').removeClass('active');
            $(this).addClass('active');
        });

    } catch (error) { console.error("Помилка:", error); }
}
initArchive();
</script>

</body>
</html>
